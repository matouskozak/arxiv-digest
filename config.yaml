# Keywords for LLM filtering of relevant papers
keywords:
  - "Adversarial Attacks"
  - "Malware"
  - "Antivirus"
  - "Large Language Models"
  - "Code Generation"

arxiv:
  categories:
    - "cs.CR" # Cryptography and Security
    # - "cs.LG" # Machine Learning
    # - "cs.SE" # Software Engineering
    # - "cs.CL" # Computation and Language
    # - "cs.AI" # Artificial Intelligence
  max_results: 1000

github:
  usernames:
    - "matouskozak"
  issue_label: "arxiv-summary"
  max_papers_per_issue: 10

llm_service:
  base_url: "https://models.github.ai/inference"
  # API key is read from LLM_API_KEY env var, falling back to GITHUB_TOKEN
  # Examples for other providers:
  # OpenAI: base_url: "https://api.openai.com/v1"
  # Azure: base_url: "https://<resource>.openai.azure.com/openai/deployments/<deployment>"
  # Local: base_url: "http://localhost:11434/v1"

models:
  filter: "gpt-4.1-mini"
  summarize: "gpt-4.1"
